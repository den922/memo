<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Daily Memo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF9F6;
  --surface: #FFFFFF;
  --surface-2: #F5F3EE;
  --border: #E8E4DC;
  --text: #1C1A17;
  --text-2: #6B6560;
  --text-3: #A09890;
  --accent: #2B4A3A;
  --accent-mid: #3D6B55;
  --accent-light: #EAF2EC;
  --accent-glow: rgba(43,74,58,0.12);
  --gold: #C9A84C;
  --danger: #9B3A2F;
  --danger-light: #FDF0EE;
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 4px rgba(28,26,23,0.06);
  --shadow: 0 4px 20px rgba(28,26,23,0.08), 0 1px 4px rgba(28,26,23,0.04);
  --shadow-lg: 0 12px 48px rgba(28,26,23,0.12), 0 4px 12px rgba(28,26,23,0.06);
  --t: 0.22s cubic-bezier(0.4,0,0.2,1);
  --t-spring: 0.38s cubic-bezier(0.34,1.56,0.64,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  color: var(--text);
}

/* ── HEADER ── */
.header {
  background: var(--accent);
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-left {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 20px;
  color: #fff;
  letter-spacing: 0.02em;
}
.header-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  background: rgba(255,255,255,0.1);
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}
/* Decorative accent line */
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent 60%);
}

/* ── SEARCH ── */
.search {
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-inner {
  display: flex;
  align-items: center;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 0 14px;
  gap: 8px;
  transition: border-color var(--t), box-shadow var(--t);
}
.search-inner:focus-within {
  border-color: var(--accent-mid);
  box-shadow: 0 0 0 3px var(--accent-glow);
  background: var(--surface);
}
.search-icon { font-size: 14px; color: var(--text-3); flex-shrink: 0; }
.search input {
  flex: 1;
  min-width: 0;
  padding: 10px 0;
  border: none;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
}
.search input::placeholder { color: var(--text-3); }
.search-clear {
  width: 20px;
  height: 20px;
  border: none;
  background: var(--text-3);
  color: #fff;
  border-radius: 50%;
  font-size: 11px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: inherit;
  line-height: 1;
  transition: background var(--t);
}
.search-clear.visible { display: flex; }
.search-clear:active { background: var(--text-2); }

/* ── LIST ── */
.list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px 90px;
  scroll-padding-top: 8px;
}
.list::-webkit-scrollbar { width: 4px; }
.list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }



/* EMPTY */
.empty {
  text-align: center;
  padding: 80px 24px;
  animation: fadeUp 0.4s ease both;
}
.empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.25; display: block; }
.empty-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text-2); margin-bottom: 8px; }
.empty-sub { font-size: 14px; color: var(--text-3); line-height: 1.7; }

/* ── SWIPE CARD ── */
.swipe-wrap {
  position: relative;
  overflow: hidden;
  margin-bottom: 8px;
  border-radius: var(--radius);
}
.delete-bg {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 80px;
  background: var(--danger);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  border-radius: var(--radius);
  gap: 4px;
  flex-direction: column;
  cursor: pointer;
  letter-spacing: 0.04em;
  visibility: hidden;
}
.swipe-wrap.is-swiping .delete-bg {
  visibility: visible;
}
.delete-bg-icon { font-size: 20px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  box-shadow: var(--shadow-sm);
  user-select: none;
  transition: box-shadow var(--t), transform 0.18s ease;
  animation: fadeUp 0.3s ease both;
}
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 12px; bottom: 12px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
  opacity: 0;
  transition: opacity var(--t);
}
.card:active { transform: scale(0.985); box-shadow: none; }
.card:hover::before { opacity: 1; }

.card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.card-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
  font-weight: 400;
  letter-spacing: 0.04em;
}
.card-dot {
  width: 3px; height: 3px;
  background: var(--border);
  border-radius: 50%;
}
.card-age {
  font-size: 10px;
  color: var(--text-3);
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
  margin-bottom: 4px;
}
.card-preview {
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  font-weight: 300;
}

/* ── FAB ── */
.fab-wrap {
  position: fixed;
  right: 20px;
  bottom: 28px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.fab {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(43,74,58,0.35), 0 2px 6px rgba(43,74,58,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--t-spring), box-shadow var(--t);
  position: relative;
  overflow: hidden;
}
.fab::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background var(--t);
}
.fab:active { transform: scale(0.9); box-shadow: 0 2px 8px rgba(43,74,58,0.25); }
.fab:hover { transform: scale(1.06); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text);
  color: rgba(255,255,255,0.92);
  padding: 12px 16px 12px 18px;
  border-radius: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  font-size: 13.5px;
  font-weight: 400;
  z-index: 200;
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
.toast-text { opacity: 0.75; }
.toast-undo {
  background: none;
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  font-weight: 600;
  font-size: 12.5px;
  cursor: pointer;
  padding: 4px 12px;
  border-radius: 6px;
  font-family: 'Noto Sans JP', sans-serif;
  transition: background var(--t);
  letter-spacing: 0.02em;
}
.toast-undo:active { background: rgba(255,255,255,0.12); }

/* ── OVERLAY ── */
.detail-overlay {
  position: fixed;
  inset: 0;
  background: rgba(28,26,23,0.4);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 300;
}
.detail-overlay.show { opacity: 1; pointer-events: auto; }

/* ── SHEET ── */
.detail {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  padding: 0 22px 44px;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  transform: translateY(100%);
  transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
  z-index: 400;
}
.detail.show { transform: translateY(0); }
.detail::-webkit-scrollbar { width: 3px; }
.detail::-webkit-scrollbar-thumb { background: var(--border); }

.detail-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 14px auto 18px;
}

.detail-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}
.detail-label {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.01em;
}
.detail-close {
  background: var(--surface-2);
  border: 1px solid var(--border);
  width: 30px; height: 30px;
  border-radius: 50%;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-2);
  transition: background var(--t), transform var(--t);
  font-family: inherit;
  line-height: 1;
}
.detail-close:active { background: var(--border); transform: scale(0.92); }

/* ── VIEW ── */
.view-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.view-date::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 1.5px;
  background: var(--gold);
  border-radius: 1px;
}
.view-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.3;
  letter-spacing: 0.01em;
}
.view-content {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text-2);
  white-space: pre-wrap;
  word-break: break-word;
  font-weight: 300;
  border-top: 1px solid var(--border);
  padding-top: 18px;
}
.view-actions {
  display: flex;
  gap: 10px;
  margin-top: 28px;
}
.edit-btn {
  flex: 1;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--t), transform var(--t);
  letter-spacing: 0.03em;
}
.edit-btn:active { transform: scale(0.97); background: #1E3A2B; }
.delete-btn {
  padding: 13px 18px;
  background: var(--danger-light);
  color: var(--danger);
  border: 1px solid rgba(155,58,47,0.15);
  border-radius: var(--radius);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background var(--t), transform var(--t);
}
.delete-btn:active { transform: scale(0.97); }

/* ── FORM ── */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 10.5px;
  font-weight: 700;
  color: var(--text-3);
  margin-bottom: 7px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.field input,
.field textarea {
  display: block;
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  color: var(--text);
  background: var(--surface-2);
  outline: none;
  -webkit-appearance: none;
  resize: none;
  transition: border-color var(--t), background var(--t), box-shadow var(--t);
  font-weight: 400;
}
.field input:focus,
.field textarea:focus {
  border-color: var(--accent-mid);
  background: var(--surface);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.field input#fTitle {
  font-size: 17px;
  font-weight: 700;
}
.field textarea {
  height: 160px;
  line-height: 1.7;
  font-size: 15px;
  font-weight: 300;
}

.error-msg {
  color: var(--danger);
  font-size: 12px;
  margin-bottom: 14px;
  display: none;
  align-items: center;
  gap: 6px;
  background: var(--danger-light);
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid rgba(155,58,47,0.15);
}
.error-msg.show { display: flex; }

.save-btn {
  width: 100%;
  padding: 15px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background var(--t), transform var(--t), box-shadow var(--t);
  box-shadow: 0 4px 16px var(--accent-glow);
}
.save-btn:active { transform: scale(0.98); background: #1E3A2B; }

/* ── CHARS COUNTER ── */
.field-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 5px;
}
.char-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-3);
}

/* ── HIGHLIGHT ── */
mark.hl {
  background: #FFF5C2;
  color: var(--text);
  border-radius: 2px;
  padding: 0 1px;
  font-style: normal;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Daily Memo</span>
    <span class="header-sub">notebook</span>
  </div>
  <span class="header-count" id="headerCount">0 件</span>
</div>

<div class="search">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input id="searchInput" placeholder="メモを検索..." autocomplete="off" inputmode="search">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<div class="list" id="list"></div>

<div class="fab-wrap">
  <button class="fab" id="fab" title="新規メモ">+</button>
</div>

<div class="toast" id="toast">
  <span class="toast-text">削除しました</span>
  <button class="toast-undo" id="toastUndo">元に戻す</button>
</div>

<div class="detail-overlay" id="overlay"></div>
<div class="detail" id="detail">
  <div class="detail-handle"></div>
  <div id="detailContent"></div>
</div>

<script>
(function () {
  'use strict';

  var KEY = 'memo_v17';

  var state = {
    memos: [],
    lastDeleted: null,
    toastTimer: null,
    swipe: { el: null, startX: 0, currentX: 0, moved: false }
  };

  /* ── STORAGE ── */
  function load() {
    try { state.memos = JSON.parse(localStorage.getItem(KEY) || '[]'); }
    catch (e) { state.memos = []; }
    // migrate from old key
    if (state.memos.length === 0) {
      try {
        var old = JSON.parse(localStorage.getItem('memo_v16') || '[]');
        if (old.length) { state.memos = old; persist(); }
      } catch (e) {}
    }
  }
  function persist() {
    try { localStorage.setItem(KEY, JSON.stringify(state.memos)); }
    catch (e) {}
  }

  /* ── UTILS ── */
  function today() {
    return new Date().toISOString().slice(0, 10);
  }
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function highlight(str, q) {
    var escaped = escHtml(str);
    if (!q) return escaped;
    var safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(safe, 'gi'), function (m) {
      return '<mark class="hl">' + m + '</mark>';
    });
  }
  function snippet(content, q) {
    if (!content) return '';
    if (!q) return escHtml(content.slice(0, 120));
    var lower = content.toLowerCase();
    var idx = lower.indexOf(q.toLowerCase());
    if (idx === -1) return escHtml(content.slice(0, 80));
    var start = Math.max(0, idx - 30);
    var end = Math.min(content.length, idx + q.length + 70);
    var text = (start > 0 ? '…' : '') + content.slice(start, end) + (end < content.length ? '…' : '');
    return highlight(text, q);
  }


  /* ── FILTER ── */
  function filteredMemos() {
    var q = document.getElementById('searchInput').value.trim().toLowerCase();
    var result = state.memos.map(function (m, i) { return { m: m, origIdx: i }; });
    if (!q) return result;
    return result.filter(function (item) {
      return JSON.stringify(item.m).toLowerCase().indexOf(q) !== -1;
    });
  }

  /* ── RENDER ── */
  function render() {
    var list = document.getElementById('list');
    var q = document.getElementById('searchInput').value.trim();
    var items = filteredMemos().sort(function (a, b) {
      return new Date(b.m.date || 0) - new Date(a.m.date || 0);
    });

    // Update count badge
    document.getElementById('headerCount').textContent = state.memos.length + ' 件';

    // Search clear btn
    var clearBtn = document.getElementById('searchClear');
    clearBtn.classList.toggle('visible', q.length > 0);

    if (items.length === 0) {
      list.innerHTML =
        '<div class="empty">' +
        '<span class="empty-icon">📄</span>' +
        '<div class="empty-title">' + (q ? '見つかりませんでした' : 'まだメモがありません') + '</div>' +
        '<div class="empty-sub">' + (q ? '別のキーワードで試してみてください' : '右下の ＋ ボタンで\n最初のメモを作りましょう') + '</div>' +
        '</div>';
      return;
    }

    // Reset any lingering swipe state
    state.swipe.el = null;

    var html = '';
    items.forEach(function (item) {
      var m = item.m;
      var i = item.origIdx;
      html +=
        '<div class="swipe-wrap" data-idx="' + i + '">' +
        '<div class="delete-bg"><div class="delete-bg-icon">\uD83D\uDDD1</div>\u524A\u9664</div>' +
        '<div class="card">' +
        '<div class="card-meta">' +
        '<span class="card-date">' + escHtml(m.date || '\u2014') + '</span>' +
        '</div>' +
        '<div class="card-title">' + highlight(m.title || '(\u30BF\u30A4\u30C8\u30EB\u306A\u3057)', q) + '</div>' +
        (m.content ? '<div class="card-preview">' + snippet(m.content, q) + '</div>' : '') +
        '</div></div>';
    });

    list.innerHTML = html;

    // Stagger animation
    list.querySelectorAll('.card').forEach(function (card, idx) {
      card.style.animationDelay = (idx * 30) + 'ms';
    });

    list.querySelectorAll('.swipe-wrap').forEach(function (wrap) {
      var origIdx = parseInt(wrap.dataset.idx, 10);
      var card = wrap.querySelector('.card');
      var bg = wrap.querySelector('.delete-bg');

      bg.addEventListener('click', function () { deleteItem(origIdx); });
      card.addEventListener('click', function () {
        if (!state.swipe.moved) openDetail(origIdx);
      });
      card.addEventListener('touchstart', function (e) { touchStart(e, card); }, { passive: true });
      card.addEventListener('touchmove',  function (e) { touchMove(e, card);  }, { passive: true });
      card.addEventListener('touchend',   function (e) { touchEnd(e, card);   });
    });
  }

  /* ── SWIPE ── */
  function touchStart(e, el) {
    state.swipe.startX = e.touches[0].clientX;
    state.swipe.currentX = e.touches[0].clientX;
    state.swipe.moved = false;
    if (state.swipe.el && state.swipe.el !== el) {
      state.swipe.el.style.transition = 'transform 0.2s ease';
      state.swipe.el.style.transform = '';
      state.swipe.el.parentNode.classList.remove('is-swiping');
      state.swipe.el = null;
    }
  }
  function touchMove(e, el) {
    state.swipe.currentX = e.touches[0].clientX;
    var diff = state.swipe.currentX - state.swipe.startX;
    if (Math.abs(diff) > 8) state.swipe.moved = true;
    if (diff < 0) {
      el.parentNode.classList.add('is-swiping');
      el.style.transition = 'none';
      el.style.transform = 'translateX(' + Math.max(diff, -80) + 'px)';
    }
  }
  function touchEnd(e, el) {
    var diff = state.swipe.currentX - state.swipe.startX;
    el.style.transition = 'transform 0.22s ease';
    if (diff < -60) {
      el.parentNode.classList.add('is-swiping');
      el.style.transform = 'translateX(-80px)';
      state.swipe.el = el;
    } else {
      el.parentNode.classList.remove('is-swiping');
      el.style.transform = '';
      state.swipe.el = null;
    }
    setTimeout(function () { state.swipe.moved = false; }, 50);
  }

  /* ── DELETE ── */
  function deleteItem(origIdx) {
    state.lastDeleted = { item: Object.assign({}, state.memos[origIdx]), index: origIdx };
    state.memos.splice(origIdx, 1);
    persist();
    render();
    showToast();
  }

  /* ── TOAST ── */
  function showToast() {
    var toast = document.getElementById('toast');
    toast.classList.add('show');
    clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(function () {
      toast.classList.remove('show');
      state.lastDeleted = null;
    }, 4500);
  }
  document.getElementById('toastUndo').addEventListener('click', function () {
    if (!state.lastDeleted) return;
    state.memos.splice(state.lastDeleted.index, 0, state.lastDeleted.item);
    persist();
    render();
    document.getElementById('toast').classList.remove('show');
    clearTimeout(state.toastTimer);
    state.lastDeleted = null;
  });

  /* ── SHEET ── */
  function openSheet() {
    document.getElementById('overlay').classList.add('show');
    document.getElementById('detail').classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeSheet() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('detail').classList.remove('show');
    document.body.style.overflow = '';
  }
  document.getElementById('overlay').addEventListener('click', closeSheet);

  function openDetail(origIdx) {
    if (origIdx === undefined || origIdx === null) {
      renderForm(null);
    } else {
      renderView(origIdx);
    }
  }

  /* ── VIEW ── */
  function renderView(origIdx) {
    var m = state.memos[origIdx];
    var dc = document.getElementById('detailContent');
    dc.innerHTML =
      '<div class="detail-header">' +
      '<div class="detail-label">メモを見る</div>' +
      '<button class="detail-close" id="detailClose">✕</button>' +
      '</div>' +
      '<div class="view-date">' + escHtml(m.date || '日付なし') + '</div>' +
      '<div class="view-title">' + escHtml(m.title || '(タイトルなし)') + '</div>' +
      '<div class="view-content">' + escHtml(m.content || '') + '</div>' +
      '<div class="view-actions">' +
      '<button class="edit-btn" id="editBtn">✏️ 編集する</button>' +
      '<button class="delete-btn" id="viewDeleteBtn">🗑</button>' +
      '</div>';
    document.getElementById('detailClose').addEventListener('click', closeSheet);
    document.getElementById('editBtn').addEventListener('click', function () { renderForm(origIdx); });
    document.getElementById('viewDeleteBtn').addEventListener('click', function () {
      closeSheet();
      setTimeout(function () { deleteItem(origIdx); }, 200);
    });
    openSheet();
  }

  /* ── FORM ── */
  function renderForm(origIdx) {
    var isNew = (origIdx === null || origIdx === undefined);
    var m = isNew ? { date: today(), title: '', content: '' } : state.memos[origIdx];
    var dc = document.getElementById('detailContent');
    dc.innerHTML =
      '<div class="detail-header">' +
      '<div class="detail-label">' + (isNew ? '新しいメモ' : 'メモを編集') + '</div>' +
      '<button class="detail-close" id="detailClose">✕</button>' +
      '</div>' +
      '<div class="error-msg" id="errorMsg">⚠ タイトルを入力してください</div>' +
      '<div class="field">' +
      '<label>日付</label>' +
      '<input type="date" id="fDate" value="' + escHtml(m.date) + '">' +
      '</div>' +
      '<div class="field">' +
      '<label>タイトル</label>' +
      '<input type="text" id="fTitle" placeholder="タイトルを入力" value="' + escHtml(m.title) + '" maxlength="80">' +
      '</div>' +
      '<div class="field">' +
      '<label>内容</label>' +
      '<textarea id="fContent" placeholder="メモの内容を入力...">' + escHtml(m.content) + '</textarea>' +
      '<div class="field-footer"><span class="char-count" id="charCount">0 文字</span></div>' +
      '</div>' +
      '<button class="save-btn" id="saveBtn">' + (isNew ? '保存する' : '更新する') + '</button>';

    document.getElementById('detailClose').addEventListener('click', closeSheet);

    var fContent = document.getElementById('fContent');
    var charCount = document.getElementById('charCount');
    function updateCount() {
      charCount.textContent = fContent.value.length + ' 文字';
    }
    fContent.addEventListener('input', updateCount);
    updateCount();

    document.getElementById('saveBtn').addEventListener('click', function () {
      var title   = document.getElementById('fTitle').value.trim();
      var date    = document.getElementById('fDate').value;
      var content = document.getElementById('fContent').value.trim();
      var err     = document.getElementById('errorMsg');
      if (!title) {
        err.classList.add('show');
        document.getElementById('fTitle').focus();
        return;
      }
      err.classList.remove('show');
      if (isNew) {
        state.memos.unshift({ date: date, title: title, content: content });
      } else {
        state.memos[origIdx] = { date: date, title: title, content: content };
      }
      persist();
      closeSheet();
      render();
    });

    openSheet();
    setTimeout(function () {
      var t = document.getElementById('fTitle');
      if (t) t.focus();
    }, 420);
  }

  /* ── FAB & SEARCH ── */
  document.getElementById('fab').addEventListener('click', function () { openDetail(); });

  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('searchInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') render();
  });
  document.getElementById('searchClear').addEventListener('click', function () {
    document.getElementById('searchInput').value = '';
    render();
    document.getElementById('searchInput').focus();
  });

  /* ── BOOT ── */
  load();
  render();

}());
</script>
</body>
</html>
